# TrustFlow nginx — serves the React SPA and reverse-proxies the API.
#
# The frontend calls the backend ONLY through same-origin RELATIVE /v1 paths
# (web/src/api.ts uses BASE = '/v1', incl. the EventSource SSE stream), so all
# API traffic arrives here and is proxied to the backend container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Optional shared-passcode gate --------------------------------------
    # Generated at container start by /docker-entrypoint.d/40-basic-auth.sh from
    # the BASIC_AUTH_USER / BASIC_AUTH_PASSWORD env vars. Off unless both are set
    # (so local/dev stays open; the public ECS box turns it on). Applies to the
    # whole server — SPA and /v1 — so one passcode gates everything.
    include /etc/nginx/conf.d/auth.inc;

    # --- API + SSE reverse proxy --------------------------------------------
    # `backend` is the compose service name; 8080 is the backend PORT.
    # SSE (the boardroom stream) is the #1 gotcha: nginx must NOT buffer or
    # cache the response, must speak HTTP/1.1, must not forward a Connection
    # header that breaks keep-alive, and must not time the long stream out.
    location /v1/ {
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE passthrough — keep the stream live and un-buffered.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # --- SPA fallback --------------------------------------------------------
    # React Router-less app, but serve index.html for any non-asset path so a
    # refresh / deep link never 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
